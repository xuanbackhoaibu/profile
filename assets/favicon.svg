<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Trần Xuân Bắc">
  <defs>
    <clipPath id="avatarClip">
      <circle cx="32" cy="32" r="27"/>
    </clipPath>
    <radialGradient id="ringGlow" cx="30%" cy="24%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#70f0b2"/>
      <stop offset="1" stop-color="#f2cc55"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="18" fill="#060807"/>
  <circle cx="32" cy="32" r="30" fill="url(#ringGlow)"/>
  <image
    href="profile-photo.jpg"
    x="5"
    y="5"
    width="54"
    height="54"
    preserveAspectRatio="xMidYMin slice"
    clip-path="url(#avatarClip)"
  />
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="2"/>
</svg>
